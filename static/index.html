<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- FORBID ZERO/DARK SCHEMES SO SCREEN LIGHT CAN BE TRULY WHITE -->
    <meta name="color-scheme" content="light only">
    <title>Wireless Camera</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        <!-- Live Preview Full Screen -->
        <div class="video-container">
            <video id="preview" autoplay playsinline muted></video>
            
            <!-- Top Status Indicator -->
            <div class="top-bar">
                <div class="status-badge" id="status-badge">
                    <span class="dot"></span>
                    <span id="status-text">Ready</span>
                </div>
                <button id="lang-btn" class="icon-btn tiny" onclick="toggleLang()">PL</button>
            </div>
            
            <!-- Bottom Controls Overlay -->
            <div class="bottom-controls">
                <div class="camera-pills" id="camera-pills">
                    <!-- Dynamic Camera Buttons -->
                </div>
                
                <div class="action-row">
                    <button id="light-btn" class="icon-btn" onclick="toggleLight()">
                        💡
                    </button>
                    <button id="start-btn" class="main-record-btn" onclick="toggleStream()">
                        <div class="record-inner"></div>
                    </button>
                    <div style="width: 50px;"></div> <!-- Spacer to center record button -->
                </div>
            </div>
        </div>
    </main>
    
    <!-- PURE WHITE FACE LIGHT OVERLAY -->
    <div id="screen-light-overlay" onclick="toggleLight()">
        <span id="light-text">Tap to close 💡 (Set MAX brightness)</span>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
